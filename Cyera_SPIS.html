// ─── UTILITIES ───────────────────────────────────────────────────────────────

const fmtM = n => {
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n;
};
const fmtPct = n => (n * 100).toFixed(0) + '%';
const covRatio = (pipeline, quota) => pipeline / quota;
const covStr = (pipeline, quota) => (pipeline/quota).toFixed(1) + 'x';
const scoreColor = s => s >= 80 ? '#22C55E' : s >= 60 ? '#F59E0B' : '#EF4444';
const covColor = r => r >= 3.5 ? '#22C55E' : r > 2.45 ? '#F59E0B' : '#EF4444';
const heatRatio = r => r >= 1.0 ? 'green' : r > 0.7 ? 'amber' : 'red';
const statusTag = s => s === 'approved'
  ? { label:'Approved', bg:'rgba(34,197,94,.12)', color:'#22C55E' }
  : { label:'Needs Revision', bg:'rgba(239,68,68,.12)', color:'#EF4444' };
const accessColor = a => a === 'Warm' ? '#22C55E' : a === 'Partner' ? '#00A1E0' : '#94A3B8';
const tierColor = t => t === 1 ? '#00C2CB' : t === 2 ? '#F59E0B' : '#64748B';

// ─── API ─────────────────────────────────────────────────────────────────────

async function callAPI(prompt, systemPrompt) {
  const key = localStorage.getItem('cyera_spis_key');
  if (!key || !key.startsWith('sk-')) {
    alert('API key not found. Please reload the page and enter your key.');
    return null;
  }
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2000,
        system: systemPrompt || 'You are an expert enterprise sales planning assistant for Cyera, a data security company. Generate specific, account-grounded content for territory and account planning. Never use generic language.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error ' + response.status);
    }
    const data = await response.json();
    return data.content[0].text;
  } catch (e) {
    throw e;
  }
}

function AccountPlanSection({ acc, seller, apiKey, sectionKey, sectionLabel }) {
  const stateKey = acc.name + '_' + sectionKey;
  const prepopped = PRE_POPULATED_PLANS[stateKey];
  const [content, setContent] = useState(prepopped || '');
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    setLoading(true);
    try {
      const prompts = {
        overview: `You are a Cyera enterprise sales strategist. Generate an account overview for ${acc.name}.

Company: ${acc.name} | Industry: ${acc.industry} | Revenue: $${acc.revenue}
Trigger: ${acc.trigger}
Access: ${acc.access}

Generate a structured account overview:
1. Executive Summary (why this account, why now — 2-3 sentences)
2. Point of View for CISO/CDO outreach (compelling opening for outreach email)
3. Account Snapshot (current status, key open questions, recommended next action)

Be specific to this company's trigger and Cyera's DSPM capabilities.`,

        stakeholders: `Generate a stakeholder map for ${acc.name} in the context of a Cyera DSPM evaluation.
Industry: ${acc.industry} | Revenue: $${acc.revenue}
Trigger: ${acc.trigger}

Create a stakeholder analysis:
1. Economic Buyer (likely title, agenda, what they care about)
2. Technical Evaluator (concerns, evaluation criteria)
3. Champion Profile (who would champion Cyera, why)
4. Blocker/Skeptic (who might push back and how to address)
5. Outreach Priority (who to contact first and why)`,

        businesscase: `Generate a business case for ${acc.name}'s evaluation of Cyera DSPM.
Industry: ${acc.industry} | Revenue: $${acc.revenue}
Trigger: ${acc.trigger}

Structure the business case:
1. Current State (the pain — specific to this company)
2. Business Impact (quantified where possible — regulatory risk, operational cost)
3. Future State with Cyera (specific outcomes and timelines)
4. ROI Framework (cost avoidance, efficiency gains, risk reduction)
5. Why Cyera vs. Alternatives`,

        pursuit: `Generate a pursuit plan for ${acc.name}.
Industry: ${acc.industry} | Revenue: $${acc.revenue}
Trigger: ${acc.trigger} | Access: ${acc.access}

Create an actionable pursuit plan:
1. Deal Strategy (approach, positioning, key milestones)
2. First Meeting Agenda (opening, discovery, next step close)

4. Competitive Differentiation (specific to likely alternatives)
5. 30/60/90 Day Plan (specific actions and success criteria)

      };
      const result = await callAPI(prompts[sectionKey] || prompts.overview);
      setContent(result);
    } catch (e) {
      alert('Generation error: ' + e.message);
    } finally {
      setLoading(false);

  };

  return (
    <div>
      <div className="row-between" style={{ marginBottom:14 }}>

          <AiBadge />
          <span style={{ fontSize:13, fontWeight:600, marginLeft:8 }}>{sectionLabel}</span>

        <button className="btn-secondary" disabled={loading} onClick={generate}>

      {content

          <div style={{ textAlign:'center', padding:48, color:'var(--muted)' }}>
            <div style={{ fontSize:28, marginBottom:10 }}>✦</div>
            <div style={{ fontSize:13, marginBottom:16 }}>Click Generate to create AI-powered {sectionLabel.toLowerCase()}</div>
            <button className="btn-primary" onClick={generate} disabled={loading}>
              {loading ? <><Spinner /> Generating...</> : '✦ Generate ' + sectionLabel}
            </button>
          </div>
        )
      }
    </div>
  );
}

                </td>
                <td>
                  <textarea
                    style={{ width:'100%', background:'transparent', border:'none', color:'var(--text)', fontSize:12, resize:'vertical', outline:'none', minHeight:36, padding:'4px 0', fontFamily:'IBM Plex Sans', lineHeight:1.5 }}
                    placeholder="Add coaching notes..."
                    value={(criteria[c] || {}).notes || ''}
                    onChange={e => setCriterion(c, 'notes', e.target.value)}
                  />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="card">
        <div className="row-between" style={{ marginBottom:14 }}>
          <div className="row"><AiBadge /><h3 style={{ marginLeft:8 }}>AI Coaching Brief</h3></div>
          <button className="btn-secondary" disabled={coachLoading} onClick={generateCoachBrief}>
            {coachLoading ? <><Spinner /> Generating...</> : '✦ Generate Coaching Brief'}
          </button>
        </div>
        {coachBrief
          ? <div className="gen-block">{coachBrief}</div>
          : <div style={{ fontSize:12, color:'var(--dim)', padding:'20px 0' }}>Complete review criteria above, then generate the AI coaching brief.</div>
        }
      </div>
    </div>
  );
}

// ─── SCREEN 5: WEEKLY COACHING DASHBOARD ─────────────────────────────────────

function Screen5({ sellers, apiKey }) {
  const [selId, setSelId] = useState(null);
  const [agenda, setAgenda] = useState('');
  const [loading, setLoading] = useState(false);

  const sel = sellers.find(s => s.id === selId);

  const generateAgenda = async () => {
    if (!sel) return;
    setLoading(true);
    try {
      const cov = covRatio(sel.pipeline, sel.quota);
      const covVsTarget = (cov / 3.5).toFixed(2);
      const prompt = `Generate a 45-minute weekly coaching session agenda for ${sel.name}.

METRICS:
Pipeline: ${fmtM(sel.pipeline)} | Quota: ${fmtM(sel.quota)} | Coverage: ${covStr(sel.pipeline, sel.quota)} vs 3.5x target
Forecast Commit: ${fmtM(sel.forecast_commit)} | YTD Closed: ${fmtM(sel.ytd_closed)}
Win Rate: ${fmtPct(sel.win_rate)} | Plan Score: ${sel.plan_score}/100 | Status: ${sel.plan_status}
Coverage vs target: ${(parseFloat(covVsTarget)*100).toFixed(0)}% of goal

Structure the coaching session:
1. Deal Review (10 min) — which specific deals to discuss and focus areas
2. Pipeline Review (10 min) — coverage gaps and new opportunity sources
3. Skill Development (10 min) — specific competency to build this week based on their metrics
4. Blockers & Requests (5 min) — what they need from leadership
5. Commitments (10 min) — specific actions for AE and manager this week with due dates

Be direct, specific, and action-oriented. Reference the actual numbers.`;
      const result = await callAPI(prompt);
      setAgenda(result);
    } catch (e) {
      alert('Generation error: ' + e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div>
      <h2 style={{ marginBottom:20 }}>Weekly Coaching Dashboard</h2>

      <div className="grid-3 section-gap">
        {sellers.map(s => {
          const cov = covRatio(s.pipeline, s.quota);
          const rat = cov / 3.5;
          const heat = heatRatio(rat);
          return (
            <div
              key={s.id}
              className={'heat-card heat-' + heat + (selId === s.id ? '' : '')}
              style={{ border: '2px solid ' + (heat==='green'?'var(--green)':heat==='amber'?'var(--amber)':'var(--red)'), opacity: selId && selId !== s.id ? .7 : 1 }}
              onClick={() => setSelId(s.id === selId ? null : s.id)}
            >
              <div className="row-between" style={{ marginBottom:10 }}>
                <span style={{ fontWeight:600, fontSize:14 }}>{s.name}</span>
                <ScoreCircle score={s.plan_score} />
              </div>

              <div style={{ marginBottom:8 }}>
                <div className="row-between" style={{ marginBottom:4 }}>
                  <span style={{ fontSize:11, color:'var(--muted)' }}>Pipeline Coverage</span>
                  <span className="mono" style={{ fontSize:12, color: heat==='green'?'var(--green)':heat==='amber'?'var(--amber)':'var(--red)' }}>
                    {cov.toFixed(1)}x / 3.5x
                  </span>
                </div>
                <ProgBar value={cov} max={3.5} color={heat==='green'?'var(--green)':heat==='amber'?'var(--amber)':'var(--red)'} height={6} />
              </div>

              <div className="grid-2" style={{ gap:8, marginBottom:10 }}>
                <div>
                  <div style={{ fontSize:10, color:'var(--dim)', textTransform:'uppercase', letterSpacing:'.06em' }}>Commit</div>
                  <div className="mono" style={{ fontSize:13 }}>{fmtM(s.forecast_commit)}</div>
                </div>
                <div>
                  <div style={{ fontSize:10, color:'var(--dim)', textTransform:'uppercase', letterSpacing:'.06em' }}>YTD</div>
                  <div className="mono" style={{ fontSize:13 }}>{fmtM(s.ytd_closed)}</div>
                </div>
              </div>

              <div className="row-between">
                <StatusTag status={s.plan_status} />
                <span style={{ fontSize:11, color:'var(--muted)' }}>{s.open_opps} open opps</span>
              </div>

              {heat === 'red' && (
                <div className="callout-warn" style={{ marginTop:10 }}>
                  ⚠ Pipeline at {(rat*100).toFixed(0)}% of 3.5x target — coaching focus needed
                </div>
              )}
            </div>
          );
        })}
      </div>

      {selId && (
        <div className="card">
          <div className="row-between" style={{ marginBottom:14 }}>
            <div className="row">
              <AiBadge />
              <h3 style={{ marginLeft:8 }}>Coaching Agenda — {sel?.name}</h3>
            </div>
            <button className="btn-primary" disabled={loading} onClick={generateAgenda}>
              {loading ? <><Spinner /> Generating...</> : '✦ Generate Coaching Agenda'}
            </button>
          </div>
          {agenda
            ? <div className="gen-block">{agenda}</div>
            : <div style={{ fontSize:12, color:'var(--dim)', padding:'16px 0' }}>Click Generate Coaching Agenda to create an AI-powered session plan for {sel?.name}.</div>
          }
        </div>
      )}
    </div>
  );
}

// ─── SCREEN 6: EXECUTIVE SUMMARY ─────────────────────────────────────────────

function Screen6({ sellers, apiKey }) {
  const [summary, setSummary] = useState('');
  const [loading, setLoading] = useState(false);

  const totalPipeline = sellers.reduce((a, s) => a + s.pipeline, 0);
  const totalQuota    = sellers.reduce((a, s) => a + s.quota, 0);
  const totalCommit   = sellers.reduce((a, s) => a + s.forecast_commit, 0);
  const totalBest     = sellers.reduce((a, s) => a + s.forecast_best, 0);
  const totalYTD      = sellers.reduce((a, s) => a + s.ytd_closed, 0);
  const totalOpps     = sellers.reduce((a, s) => a + s.open_opps, 0);
  const avgWinRate    = sellers.reduce((a, s) => a + s.win_rate, 0) / sellers.length;
  const regCov        = covRatio(totalPipeline, totalQuota);

  const maxPipeline = Math.max(...sellers.map(s => s.pipeline));

  const generateSummary = async () => {
    setLoading(true);
    try {
      const sellerData = sellers.map(s => `${s.name}: Pipeline ${fmtM(s.pipeline)} | Coverage ${covStr(s.pipeline, s.quota)} | Commit ${fmtM(s.forecast_commit)} | YTD ${fmtM(s.ytd_closed)} | Score ${s.plan_score} | ${s.plan_status}`).join('\n');
      const prompt = `Generate an executive summary for a VP/CRO of a Cyera DSPM sales region.

REGIONAL METRICS:
Total Pipeline: ${fmtM(totalPipeline)} | Quota: ${fmtM(totalQuota)} | Coverage: ${regCov.toFixed(1)}x vs 3.5x target
Forecast Commit: ${fmtM(totalCommit)} | Best Case: ${fmtM(totalBest)}
YTD Closed: ${fmtM(totalYTD)} | Attainment: ${fmtPct(totalYTD/totalQuota)}
Total Open Opps: ${totalOpps} | Avg Win Rate: ${fmtPct(avgWinRate)}

SELLER BREAKDOWN:
${sellerData}

Generate a crisp executive summary (skimmable in 2 minutes):
1. Team Performance Headline (one sentence on where we stand vs. plan)
2. Forecast Outlook (commit, best case, confidence level)
3. Pipeline Health Assessment (coverage, quality, concentration risks)
4. Top Deals to Watch (by seller with recommendation)
5. Risk Register (top 3 risks to making the number)
6. Ask from Leadership (what the team needs to hit plan)
7. Momentum & Wins (positive signals this week)

Be direct and specific. Format for executive consumption.`;
      const result = await callAPI(prompt);
      setSummary(result);
    } catch (e) {
      alert('Generation error: ' + e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div>
      <div className="row-between section-gap">
        <h2>Executive Summary</h2>
        <span style={{ fontSize:12, color:'var(--muted)' }}>Regional · Q2 FY2026</span>
      </div>

      <div className="grid-4 section-gap">
        <StatCard label="Total Pipeline" value={fmtM(totalPipeline)} sub={'Regional aggregate'} />
        <StatCard label="Total Quota" value={fmtM(totalQuota)} sub={'3 sellers'} />
        <StatCard label="Regional Coverage" value={regCov.toFixed(1) + 'x'} sub={'Target 3.5x'} color={covColor(regCov)} />
        <StatCard label="Forecast Commit" value={fmtM(totalCommit)} sub={'Hard commit'} />
        <StatCard label="Best Case" value={fmtM(totalBest)} sub={'Upside scenario'} />
        <StatCard label="YTD Closed" value={fmtM(totalYTD)} sub={'Attainment ' + fmtPct(totalYTD/totalQuota)} />
        <StatCard label="Open Opportunities" value={totalOpps} sub={'Across all sellers'} />
        <StatCard label="Avg Win Rate" value={fmtPct(avgWinRate)} sub={'Regional average'} />
      </div>

      <div className="card section-gap">
        <h3 style={{ marginBottom:16 }}>Pipeline by Seller</h3>
        {sellers.map(s => {
          const cov = covRatio(s.pipeline, s.quota);
          const cc = covColor(cov);
          return (
            <div key={s.id} style={{ marginBottom:18 }}>
              <div className="row-between" style={{ marginBottom:5 }}>
                <div className="row" style={{ gap:8 }}>
                  <span style={{ fontWeight:600, fontSize:13 }}>{s.name}</span>
                  <StatusTag status={s.plan_status} />
                </div>
                <span className="mono" style={{ fontSize:13, color:cc }}>{fmtM(s.pipeline)}</span>
              </div>
              <div style={{ height:12, background:'var(--border)', borderRadius:6, overflow:'hidden', marginBottom:4 }}>
                <div style={{ height:'100%', width: (s.pipeline/maxPipeline*100)+'%', background:cc, borderRadius:6 }} />
              </div>
              <div style={{ display:'flex', gap:16, fontSize:11, color:'var(--dim)' }}>
                <span>Coverage: <span style={{ color:cc }}>{cov.toFixed(1)}x</span></span>
                <span>Commit: <span className="mono" style={{ color:'var(--text)' }}>{fmtM(s.forecast_commit)}</span></span>
                <span>YTD: <span className="mono" style={{ color:'var(--text)' }}>{fmtM(s.ytd_closed)}</span></span>
                <span>Score: <span style={{ color:scoreColor(s.plan_score) }}>{s.plan_score}</span></span>
              </div>
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="row-between" style={{ marginBottom:14 }}>
          <div className="row"><AiBadge /><h3 style={{ marginLeft:8 }}>AI Executive Summary</h3></div>
          <button className="btn-primary" disabled={loading} onClick={generateSummary}>
            {loading ? <><Spinner /> Generating...</> : '✦ Generate Executive Summary'}
          </button>
        </div>
        {summary
          ? <div className="gen-block">{summary}</div>
          : <div style={{ fontSize:12, color:'var(--dim)', padding:'16px 0' }}>Click Generate to create an AI-powered executive summary for VP/CRO consumption.</div>
        }
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('cyera_spis_key') || '');
  const [screen, setScreen] = useState('dashboard');
  const [selectedSeller, setSelectedSeller] = useState('alex');
  const [sellers, setSellers] = useState(SELLERS_DATA);

  if (!apiKey) {
    return (
      <ApiKeyScreen onKeySubmit={k => {
        localStorage.setItem('cyera_spis_key', k);
        setApiKey(k);
      }} />
    );
  }

  const seller = sellers.find(s => s.id === selectedSeller) || sellers[0];
  const showSeller = ['territory','accounts'].includes(screen);

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar
        sellers={sellers}
        screen={screen}
        selectedSeller={selectedSeller}
        onNav={setScreen}
        onSelectSeller={setSelectedSeller}
      />
      <div className="main">
        <Topbar
          screen={screen}
          seller={showSeller ? seller : null}
          onLogout={() => { localStorage.removeItem('cyera_spis_key'); setApiKey(''); }}
        />
        <div className="content">
          {screen === 'dashboard' && (
            <Screen1
              sellers={sellers}
              setSellers={setSellers}
              onNav={setScreen}
              onSelectSeller={setSelectedSeller}
            />
          )}
          {screen === 'territory' && (
            <Screen2
              seller={seller}
              sellers={sellers}
              setSellers={setSellers}
              apiKey={apiKey}
            />
          )}
          {screen === 'accounts' && (
            <Screen3
              seller={seller}
              apiKey={apiKey}
            />
          )}
          {screen === 'review' && (
            <Screen4
              sellers={sellers}
              setSellers={setSellers}
              apiKey={apiKey}
            />
          )}
          {screen === 'coaching' && (
            <Screen5
              sellers={sellers}
              apiKey={apiKey}
            />
          )}
          {screen === 'executive' && (
            <Screen6
              sellers={sellers}
              apiKey={apiKey}
            />
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
