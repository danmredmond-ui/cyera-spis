      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 800,
        system: systemPrompt || 'You are an expert enterprise sales planning assistant for Cyera, a data security company. Generate specific, account-grounded content for territory and account planning. Never use generic language. Return concise structured output only. Use short bullet points and brief headers. Never write paragraphs longer than 2 sentences. Aim for responses under 400 words.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error ' + response.status);
    }
    const data = await response.json();
    return data.content[0].text;
  } catch (e) {
    throw e;
  }
}

function PursuitTaskList({ content, accountName }) {
  const [taskStatus, setTaskStatus] = useState({});

  const taskLines = content.split('\n').filter(l => l.trim().startsWith('ACTION:'));
  if (taskLines.length === 0) return <div className="gen-block">{content}</div>;

  const tasks = taskLines.map((line, i) => {
    const actionMatch = line.match(/ACTION:\s*([^|]+)/);
    const stakeholderMatch = line.match(/STAKEHOLDER:\s*([^|]+)/);
    const timelineMatch = line.match(/TIMELINE:\s*(.+)/);
    return {
      index: i,
      action: actionMatch?.[1]?.trim() || '',
      stakeholder: stakeholderMatch?.[1]?.trim() || '',
      timeline: timelineMatch?.[1]?.trim() || '',
    };
  });

  const borderColor = s => s === 'Complete' ? 'var(--green)' : s === 'In Progress' ? 'var(--amber)' : 'var(--border)';
  const bgColor = s => s === 'Complete' ? 'rgba(34,197,94,.07)' : s === 'In Progress' ? 'rgba(245,158,11,.07)' : 'transparent';

  return (
    <div>
      {tasks.map(task => {
        const key = accountName + '_' + task.index;
        const status = taskStatus[key] || 'Not Started';
        return (
          <div key={key} style={{
            border: '1px solid ' + borderColor(status),
            borderLeft: '3px solid ' + borderColor(status),
            background: bgColor(status),
            borderRadius: 8,
            padding: '12px 14px',
            marginBottom: 8,
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:500, color:'var(--text)', marginBottom:6, lineHeight:1.5 }}>{task.action}</div>
                <div style={{ display:'flex', gap:16, fontSize:11, color:'var(--muted)' }}>
                  <span>👤 {task.stakeholder}</span>
                  <span>🗓 {task.timeline}</span>
                </div>
              </div>
              <select
                value={status}
                onChange={e => setTaskStatus(prev => ({...prev, [key]: e.target.value}))}
                style={{ fontSize:11, minWidth:116 }}
              >
                <option>Not Started</option>
                <option>In Progress</option>
                <option>Complete</option>
              </select>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function StakeholderRenderer({ content }) {
  const rows = content.split('\n')
    .map(l => l.trim())
    .filter(l => l.startsWith('NAME:'))
    .map(l => {
      const get = (key) => { const m = l.match(new RegExp(key + ':\\s*([^|]+)')); return m?.[1]?.trim() || ''; };
      return { name: get('NAME'), title: get('TITLE'), dept: get('DEPT'), stance: get('STANCE'), action: get('ACTION') };
    });

  if (!rows.length) return <div className="gen-block">{content}</div>;

  const stanceStyle = s => {
    const sl = s.toLowerCase();
    if (sl.includes('support')) return { color:'var(--green)',  bg:'rgba(34,197,94,.12)'  };
    if (sl.includes('risk'))    return { color:'var(--red)',    bg:'rgba(239,68,68,.12)'  };
    return                               { color:'var(--amber)', bg:'rgba(245,158,11,.12)' };
  };

  return (
    <div style={{ overflowX:'auto' }}>
      <table className="table">
        <thead>
          <tr>
            {['Name','Title','Department','Stance','Recommended Action'].map(h => <th key={h}>{h}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => {
            const ss = stanceStyle(r.stance);
            return (
              <tr key={i} style={{ background: i % 2 === 1 ? 'rgba(255,255,255,.018)' : 'transparent' }}>
                <td style={{ fontWeight:600, fontSize:12 }}>{r.name}</td>
                <td style={{ fontSize:12 }}>{r.title}</td>
                <td style={{ fontSize:12, color:'var(--muted)' }}>{r.dept}</td>
                <td>
                  <span className="badge" style={{ background:ss.bg, color:ss.color, fontSize:10 }}>{r.stance}</span>
                </td>
                <td style={{ fontSize:12 }}>{r.action}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function BusinessCaseRenderer({ content }) {
  const SECS = [

  const allPat = SECS.map(s => s.label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  const parsed = {};
  SECS.forEach(s => {
    const esc = s.label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const m = content.match(new RegExp(esc + '[^\\n]*\\n([\\s\\S]*?)(?=\\n(?:' + allPat + ')|$)', 'i'));

function AccountPlanSection({ acc, seller, apiKey, sectionKey, sectionLabel }) {
  const stateKey = acc.name + '_' + sectionKey;
  const prepopped = PRE_POPULATED_PLANS[stateKey];
  const [content, setContent] = useState(prepopped || '');
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    setLoading(true);
    try {
      const prompts = {
        overview: `Generate an account overview for ${acc.name} (${acc.industry}, $${acc.revenue} revenue, ${acc.access} access).
Trigger: ${acc.trigger}

Respond with exactly these two labeled sections and nothing else:

Executive Summary
[3 sentences maximum: why this account, why now, what Cyera addresses. Be specific to this company.]

Point of View
[One paragraph of 3-4 sentences ready to paste as a cold outreach email to the CISO or CDO. Reference the specific trigger. No generic language.]`,

        stakeholders: `Generate a stakeholder map for ${acc.name} in a Cyera DSPM evaluation.
Industry: ${acc.industry} | Revenue: $${acc.revenue} | Trigger: ${acc.trigger}

Return ONLY 6-8 lines in this exact format — no headers, no other text:
NAME: Full Name | TITLE: Job Title | DEPT: Department | STANCE: Supporter or Neutral or Risk | ACTION: one sentence next step

Use realistic named contacts appropriate for a ${acc.revenue} revenue ${acc.industry} company. For Bay Area tech companies use realistic Silicon Valley executive names.`,

        businesscase: `Generate a business case for ${acc.name} evaluating Cyera DSPM.
Industry: ${acc.industry} | Revenue: $${acc.revenue} | Trigger: ${acc.trigger}

Respond with exactly these three section headers followed by bullet points:

CURRENT STATE
- [bullet specific to this company's pain]
- [bullet specific to this company's pain]
- [bullet specific to this company's pain]

BUSINESS IMPACT
- [bullet with dollar figure or quantified regulatory risk]
- [bullet with dollar figure or quantified regulatory risk]
- [bullet with dollar figure or quantified regulatory risk]

FUTURE STATE
- [measurable outcome bullet]
- [measurable outcome bullet]
- [measurable outcome bullet]`,

        pursuit: `Generate exactly 8 pursuit actions for ${acc.name} (${acc.industry}, ${acc.access} access).
Trigger: ${acc.trigger}

Return ONLY 8 lines in this exact format — no other text, no numbering, no headers:
ACTION: [specific action] | STAKEHOLDER: [name, title] | TIMELINE: [Week X or timeframe]

Actions should progress from first outreach through commercial proposal. Use realistic named contacts specific to this company and industry.`,
      };
      const result = await callAPI(prompts[sectionKey] || prompts.overview);

// ─── COACHING AGENDA RENDERER ─────────────────────────────────────────────────

function CoachingAgendaRenderer({ content }) {
  const SECTIONS = [
    { key:'PIPELINE SNAPSHOT',        color:'var(--blue)',  icon:'◉' },
    { key:'ACCOUNT SPOTLIGHT',        color:'var(--cyan)',  icon:'◆' },
    { key:'STRATEGY COACHING MOMENT', color:'var(--amber)', icon:'◐' },
    { key:"THIS WEEK'S FOCUS",        color:'var(--green)', icon:'◈' },
    { key:'RD COMMITMENT',            color:'var(--green)', icon:'◇' },
  ];

  const parsed = {};
  SECTIONS.forEach((s, i) => {
    const allEsc = SECTIONS.map(x => x.key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    const esc = s.key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const m = content.match(new RegExp(esc + '[^\\n]*\\n+([\\s\\S]*?)(?=\\n+(?:' + allEsc + ')|$)', 'i'));
    if (m) parsed[s.key] = m[1].trim();
  });

  if (!Object.keys(parsed).length) return <div className="gen-block">{content}</div>;

  return (
    <div>
      {SECTIONS.map(s => !parsed[s.key] ? null : (
        <div key={s.key} style={{
          background:'var(--card)',
          border:'1px solid var(--border)',
          borderLeft:'3px solid ' + s.color,
          borderRadius:8,
          padding:'12px 16px',
          marginBottom:10,
        }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase', color:s.color, marginBottom:8 }}>
            {s.icon} {s.key}
          </div>
          <div style={{ fontSize:12.5, lineHeight:1.75, color:'var(--text)', whiteSpace:'pre-wrap' }}>{parsed[s.key]}</div>
        </div>
      ))}
    </div>
  );
}

      <ApiKeyScreen onKeySubmit={k => {
        localStorage.setItem('cyera_spis_key', k);

      }} />

  const seller = sellers.find(s => s.id === selectedSeller) || sellers[0];

          )}

            <Screen3

          {screen === 'coaching' && (
            <Screen5
              sellers={sellers}

          {screen === 'executive' && (
            <Screen6
              sellers={sellers}

    </div>
  );
}
